name: Build and Release APK

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Create fallback .env file
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            echo "API_KEY=" > .env
          fi

      - name: Decode Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            tr -d '\r\n ' < debug.keystore.base64 | base64 -d > debug.keystore
          else
            echo "debug.keystore.base64 not found, using automatic debug signing"
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3'

      - name: Build Debug APK
        run: gradle :app:assembleDebug -Pkotlin.compiler.execution.strategy=daemon --no-configuration-cache

      - name: Upload APK Block Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
