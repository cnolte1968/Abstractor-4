name: Build and Release APK

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Diagnose File Structure
        run: |
          echo "Current working directory:" && pwd
          echo "Listing directory contents:" && ls -la
          echo "Finding files up to 2 levels deep:" && find . -maxdepth 2

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Create fallback .env file
        run: |
          ENV_EXAMPLE_PATH=$(find . -name ".env.example" -print -quit)
          if [ -n "$ENV_EXAMPLE_PATH" ]; then
            DIR=$(dirname "$ENV_EXAMPLE_PATH")
            echo "Found .env.example at $ENV_EXAMPLE_PATH"
            if [ ! -f "$DIR/.env" ]; then
              cp "$ENV_EXAMPLE_PATH" "$DIR/.env"
              echo "Created fallback .env at $DIR/.env"
            fi
          else
            SETTINGS_PATH=$(find . -name "settings.gradle.kts" -print -quit)
            if [ -n "$SETTINGS_PATH" ]; then
              DIR=$(dirname "$SETTINGS_PATH")
              echo "Creating fallback .env at $DIR/.env"
              echo "API_KEY=" > "$DIR/.env"
            fi
          fi

      - name: Decode or Generate Debug Keystore
        run: |
          KEYSTORE_BASE64_PATH=$(find . -name "debug.keystore.base64" -print -quit)
          SETTINGS_PATH=$(find . -name "settings.gradle.kts" -print -quit)
          BUILD_DIR=$(dirname "$SETTINGS_PATH")
          TARGET_KEYSTORE="$BUILD_DIR/debug.keystore"
          
          if [ -n "$KEYSTORE_BASE64_PATH" ]; then
            echo "Found debug.keystore.base64 at $KEYSTORE_BASE64_PATH"
            tr -d '\r\n ' < "$KEYSTORE_BASE64_PATH" | base64 -d > "$TARGET_KEYSTORE"
            echo "Successfully decoded debug.keystore to $TARGET_KEYSTORE"
          fi
          
          if [ ! -f "$TARGET_KEYSTORE" ]; then
            echo "debug.keystore not found or failed to decode. Generating a new debug keystore..."
            keytool -genkey -v \
              -keystore "$TARGET_KEYSTORE" \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10950 \
              -dname "CN=Android Debug,O=Android,C=US"
            echo "Generated new debug keystore at $TARGET_KEYSTORE"
          else
            echo "Using decoded debug.keystore at $TARGET_KEYSTORE"
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: |
          BUILD_DIR=$(find . -name "settings.gradle.kts" -print -quit | xargs dirname)
          echo "Project root found at: $BUILD_DIR"
          cd "$BUILD_DIR"
          gradle :app:assembleDebug --no-daemon -Pkotlin.compiler.execution.strategy=in-process --no-configuration-cache

      - name: Upload APK Block Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: "**/app/build/outputs/apk/debug/app-debug.apk"
          if-no-files-found: error
